name: nightly-ci

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  nightly-gate:
    runs-on: ubuntu-24.04
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Dependency verify-only
        run: |
          scripts/install_deps.sh --verify-only

      - name: Build eloqstore coverage
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DBUILD_TESTING=ON \
            -DPGMEM_STORE_BACKEND=eloqstore \
            -DPGMEM_ENABLE_COVERAGE=ON
          cmake --build build -j"$(nproc)"

      - name: Single-entry verification
        run: |
          scripts/start.sh verify --keep-artifacts

      - name: Upload nightly artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-ci-artifacts
          if-no-files-found: ignore
          path: |
            build/Testing/**
            build/coverage/**
            .pgmem/**
