name: pr-ci

on:
  pull_request:

jobs:
  client-mock-gate:
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Mock Codex and Claude CLIs
        run: |
          mkdir -p .mock-bin .mock-state
          cat > .mock-bin/codex <<'SH'
          #!/usr/bin/env bash
          set -euo pipefail
          state_dir="${MOCK_STATE_DIR:?missing MOCK_STATE_DIR}"
          mkdir -p "${state_dir}"
          reg="${state_dir}/codex-registry.txt"
          logged="${state_dir}/codex-logged-in"
          add_count="${state_dir}/codex-add-count"

          cmd="${1:-}"
          case "${cmd}" in
            --version)
              echo "codex 0.0.0-mock"
              exit 0
              ;;
            login)
              if [[ "${2:-}" == "status" ]]; then
                [[ -f "${logged}" ]]
                exit $?
              fi
              touch "${logged}"
              exit 0
              ;;
            mcp)
              sub="${2:-}"
              case "${sub}" in
                add)
                  name="${3:-}"
                  count=0
                  [[ -f "${add_count}" ]] && count="$(cat "${add_count}")"
                  count=$((count + 1))
                  echo "${count}" > "${add_count}"
                  if [[ "${count}" -eq 1 ]]; then
                    exit 1
                  fi
                  grep -qx "${name}" "${reg}" 2>/dev/null || echo "${name}" >> "${reg}"
                  exit 0
                  ;;
                get)
                  name="${3:-}"
                  grep -qx "${name}" "${reg}" 2>/dev/null
                  exit $?
                  ;;
                list)
                  [[ -f "${reg}" ]] && cat "${reg}"
                  exit 0
                  ;;
              esac
              ;;
          esac
          exit 1
          SH

          cat > .mock-bin/claude <<'SH'
          #!/usr/bin/env bash
          set -euo pipefail
          state_dir="${MOCK_STATE_DIR:?missing MOCK_STATE_DIR}"
          mkdir -p "${state_dir}"
          reg="${state_dir}/claude-registry.txt"
          logged="${state_dir}/claude-logged-in"
          add_count="${state_dir}/claude-add-count"

          cmd="${1:-}"
          case "${cmd}" in
            --version)
              echo "claude 0.0.0-mock"
              exit 0
              ;;
            login)
              if [[ "${2:-}" == "status" ]]; then
                [[ -f "${logged}" ]]
                exit $?
              fi
              touch "${logged}"
              exit 0
              ;;
            auth)
              if [[ "${2:-}" == "status" ]]; then
                [[ -f "${logged}" ]]
                exit $?
              fi
              ;;
            mcp)
              sub="${2:-}"
              case "${sub}" in
                add)
                  name=""
                  shift 2
                  for token in "$@"; do
                    if [[ "${token}" == --* ]]; then
                      continue
                    fi
                    if [[ "${token}" == "project" || "${token}" == "user" || "${token}" == "local" || "${token}" == "http" ]]; then
                      continue
                    fi
                    if [[ "${token}" == http://* || "${token}" == https://* ]]; then
                      continue
                    fi
                    name="${token}"
                    break
                  done
                  [[ -n "${name}" ]] || exit 1
                  count=0
                  [[ -f "${add_count}" ]] && count="$(cat "${add_count}")"
                  count=$((count + 1))
                  echo "${count}" > "${add_count}"
                  if [[ "${count}" -le 2 ]]; then
                    exit 1
                  fi
                  grep -qx "${name}" "${reg}" 2>/dev/null || echo "${name}" >> "${reg}"
                  exit 0
                  ;;
                get)
                  [[ -f "${logged}" ]] || exit 1
                  name="${3:-}"
                  grep -qx "${name}" "${reg}" 2>/dev/null
                  exit $?
                  ;;
                list)
                  [[ -f "${logged}" ]] || exit 1
                  [[ -f "${reg}" ]] && cat "${reg}"
                  exit 0
                  ;;
              esac
              ;;
          esac
          exit 1
          SH

          chmod +x .mock-bin/codex .mock-bin/claude
          echo "MOCK_STATE_DIR=$PWD/.mock-state" >> "$GITHUB_ENV"
          echo "PATH=$PWD/.mock-bin:$PATH" >> "$GITHUB_ENV"

      - name: Deploy script strict flow with mocks
        run: |
          scripts/deploy_mcp.sh \
            --workspace . \
            --url http://127.0.0.1:8765/mcp \
            --name poorguy-mem \
            --strict-runtime false \
            --strict-codex true \
            --strict-claude true \
            --auto-install-cli false \
            --force-login true \
            --max-retries 3

      - name: Verify clients with mocks
        run: |
          scripts/verify_clients.sh \
            --workspace . \
            --url http://127.0.0.1:8765/mcp \
            --name poorguy-mem \
            --real \
            --strict-runtime false \
            --strict-codex true \
            --strict-claude true

  pr-gate:
    runs-on: ubuntu-24.04
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Dependency verify-only
        env:
          PGMEM_PYTHON_BIN: python3
        run: |
          scripts/install_deps.sh --verify-only

      - name: Build eloqstore Release
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DBUILD_TESTING=ON \
            -DPGMEM_STORE_BACKEND=eloqstore
          cmake --build build -j"$(nproc)"

      - name: Unit tests (ctest)
        run: |
          ctest --test-dir build --output-on-failure

      - name: IT-01 strict eloqstore + smoke
        run: |
          scripts/verify.sh strict --pgmemd-bin ./build/pgmemd --with-smoke

      - name: IT-02 strict eloqstore accepted + stress
        run: |
          scripts/verify.sh strict \
            --pgmemd-bin ./build/pgmemd \
            --with-stress \
            --stress-iterations 2000 \
            --stress-timeout 30

      - name: IT-03 inmemory accepted shutdown drain
        run: |
          scripts/verify.sh shutdown \
            --pgmemd-bin ./build/pgmemd \
            --store-backend inmemory \
            --count 500

      - name: IT-04 forced io_uring unavailable downgrade
        run: |
          scripts/verify.sh downgrade --pgmemd-bin ./build/pgmemd

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pr-ci-failure-artifacts
          if-no-files-found: ignore
          path: |
            build/Testing/**
            .pgmem/*.log
